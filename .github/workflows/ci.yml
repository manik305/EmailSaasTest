name: CI1 Continuous Integration

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: EmailSaasTest/backend

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest httpx fastapi testclient sqlalchemy psycopg2-binary pydantic python-jose[cryptography] passlib[bcrypt] python-multipart pandas openpyxl boto3 python-dotenv openai
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Run tests with pytest
      env:
        DATABASE_URL: sqlite:///./test.db
      run: |
        export PYTHONPATH=$PYTHONPATH:$(pwd)
        pytest
